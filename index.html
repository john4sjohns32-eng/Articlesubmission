<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust | Travel Blog & Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Wanderlust</div>
        </nav>
    </header>

    <main class="container">
        <section class="blog-post">
            <h1>Exploring the Hidden Gems of the World</h1>
            <p>Traveling is not just about visiting new places; it's about experiencing different cultures and testing your global knowledge...</p>
        </section>

        <section id="quiz-section" class="quiz-container">
            <div class="quiz-header">
                <h2>Traveler's Trivia ✈️</h2>
                <p>Test your knowledge before you fly!</p>
            </div>
            
            <div id="question-container">
                <p id="question-text">Loading question...</p>
                <div id="answer-buttons" class="btn-grid"></div>
            </div>

            <div class="quiz-footer">
                <button id="next-btn" class="control-btn hide">Next Question</button>
                <div id="result-display" class="hide"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
