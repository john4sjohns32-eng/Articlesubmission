<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURE | Share Your Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ADVENTURE</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#submission" class="active-link">Submit Story</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-text">
            <h1>Capture The World</h1>
            <p>Share your travel adventures with a global community of explorers.</p>
            <a href="#submission" class="main-btn">Start Writing</a>
        </div>
    </header>

    <section id="submission" class="form-section">
        <div class="section-container">
            <div class="title-area">
                <h2>Post an Adventure</h2>
                <div class="h-line"></div>
                <p>Be the inspiration for someone's next trip.</p>
            </div>
            
            <form class="glass-form" id="articleForm" action="https://formspree.io/f/YOUR_ID" method="POST">
                <div class="input-group">
                    <input type="text" name="title" placeholder="Trip Title (e.g., Arctic Escape)" required>
                    <input type="text" name="author" placeholder="Explorer Name" required>
                </div>
                <textarea name="content" placeholder="Tell us about your journey in detail..." required></textarea>
                <button type="submit" class="submit-btn">Publish My Story</button>
            </form>
        </div>
    </section>

    <section id="contact" class="form-section dark-bg">
        <div class="section-container">
            <div class="title-area">
                <h2>Get In Touch</h2>
                <div class="h-line"></div>
            </div>
            <form class="glass-form" action="" method="POST">
                <input type="email" name="email" placeholder="Your Email Address" required>
                <textarea name="message" placeholder="How can we help you?" required></textarea>
                <button type="submit" class="submit-btn secondary">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ADVENTURE | Designed for Explorers</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
