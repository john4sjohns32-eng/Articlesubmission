<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogHub | Professional Publishing Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">Blog<span>Hub</span></a>
            <div class="nav-actions">
                <button onclick="scrollToForm()" class="btn-write">Write a Story</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Publish your passions, your way</h1>
            <p>Create a unique and beautiful blog. It’s easy and free.</p>
        </div>
    </header>

    <main class="container main-grid">
        <section id="submission-area" class="card">
            <h2>Create New Post</h2>
            <form id="postForm">
                <div class="input-group">
                    <label>Article Title</label>
                    <input type="text" id="title" placeholder="Give your story a title..." required>
                </div>
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="author" placeholder="Author name" required>
                </div>
                <div class="input-group">
                    <label>Content</label>
                    <textarea id="content" rows="8" placeholder="Tell your story..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Publish Now</button>
            </form>
        </section>

        <section class="feed-area">
            <h2>Latest Stories</h2>
            <div id="blog-feed">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
